services:
  app:
    build: .
    container_name: emotion_app
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - DEEPFACE_HOME=/opt/deepface_home
    networks:
      - emotion_net

  nginx:
    image: nginx:1.25-alpine
    container_name: emotion_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - emotion_net

networks:
  emotion_net:
    driver: bridge
